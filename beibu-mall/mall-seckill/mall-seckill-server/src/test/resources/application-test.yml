# 测试环境配置
# 禁用 Nacos，使用本地 MySQL 和 Redis

server:
  port: 9008

spring:
  application:
    name: seckill-service

  # 数据源配置：连接已运行的 MySQL 容器
  datasource:
    url: jdbc:mysql://localhost:3307/mall_seckill?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ci_mysql_test_2024
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 彻底禁用 Nacos（测试环境不需要注册中心和配置中心）
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        enabled: false
        register-enabled: false
      config:
        enabled: false
        server-addr: 127.0.0.1:8848
        import-check:
          enabled: false

  # 排除不需要的自动配置
  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.NacosServiceAutoConfiguration
      - com.alibaba.cloud.nacos.registry.NacosServiceRegistryAutoConfiguration
      - org.apache.rocketmq.spring.autoconfigure.RocketMQAutoConfiguration

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: ci_redis_test_2024

  config:
    import: ""

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.beibu.mall.seckill: debug
