# 测试环境配置
# 连接已运行的 MySQL 容器（mall-mysql:3307）

server:
  port: 9002

spring:
  application:
    name: product-service

  # 数据源配置：连接已运行的 MySQL 容器
  datasource:
    url: jdbc:mysql://localhost:3307/mall_product?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 覆盖主配置的 Nacos config import，避免连接 Nacos
  config:
    import: ""

  # 彻底禁用 Nacos（测试环境不需要注册中心和配置中心）
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        enabled: false
        register-enabled: false
      config:
        enabled: false
        server-addr: 127.0.0.1:8848

  # 排除 Nacos 自动配置，防止连接尝试
  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.NacosServiceAutoConfiguration
      - com.alibaba.cloud.nacos.registry.NacosServiceRegistryAutoConfiguration

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.beibu.mall.product: debug
