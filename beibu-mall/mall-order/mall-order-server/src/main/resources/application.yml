server:
  port: 9005

spring:
  application:
    name: order-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        username: nacos
        password: nacos
        namespace: ${ENV:dev}
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        username: nacos
        password: nacos
        file-extension: yml
        namespace: ${ENV:dev}
  config:
    import:
      - optional:nacos:order-service.yml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3307}/mall_order?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123456}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:127.0.0.1:9876}
  producer:
    group: order-producer-group
    send-message-timeout: 3000

# Seata 分布式事务配置（Nacos 注册）
seata:
  enabled: false
  application-id: ${spring.application.name}
  tx-service-group: beibu-mall-tx-group
  service:
    vgroup-mapping:
      beibu-mall-tx-group: default
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      namespace: ""
      group: SEATA_GROUP
      username: nacos
      password: nacos
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      namespace: ""
      group: SEATA_GROUP
      username: nacos
      password: nacos

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.beibu.mall.order.entity
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境改为 Slf4jImpl，避免 SQL 日志输出到 stdout
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 雪花算法配置（多实例部署时需要修改）
snowflake:
  datacenter-id: ${SNOWFLAKE_DATACENTER_ID:1}
  worker-id: ${SNOWFLAKE_WORKER_ID:1}

logging:
  level:
    com.beibu.mall.order: debug
    # 开发环境可以开启 SQL 日志
    # com.beibu.mall.order.mapper: debug
