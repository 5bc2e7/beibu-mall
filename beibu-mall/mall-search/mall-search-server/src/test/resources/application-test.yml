# 测试环境配置
# 禁用 Nacos，使用本地 Elasticsearch 和 Redis

spring:
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        enabled: false
        register-enabled: false
      config:
        enabled: false
        server-addr: 127.0.0.1:8848
        import-check:
          enabled: false
  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.NacosServiceAutoConfiguration
      - com.alibaba.cloud.nacos.registry.NacosServiceRegistryAutoConfiguration
      - org.apache.rocketmq.spring.autoconfigure.RocketMQAutoConfiguration

  elasticsearch:
    uris: localhost:9200
    username: elastic
    password: ci_es_test_2024

  data:
    redis:
      host: localhost
      port: 6379
      password: ci_redis_test_2024

  config:
    import: ""

logging:
  level:
    com.beibu.mall.search: debug
