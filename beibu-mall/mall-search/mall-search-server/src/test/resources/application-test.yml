# 测试环境配置
# 禁用 Nacos，使用本地 Elasticsearch 和 Redis

spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

  elasticsearch:
    uris: localhost:9200
    username: elastic
    password: elastic123456

  data:
    redis:
      host: localhost
      port: 6379
      password: redis123456

  config:
    import: ""

logging:
  level:
    com.beibu.mall.search: debug
